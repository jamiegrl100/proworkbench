name: Build Desktop Installers (Artifacts)

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root deps
        run: npm ci

      - name: Build UI
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Build Server
        working-directory: server
        run: |
          npm ci
          npm run build

      - name: Build Desktop
        working-directory: desktop
        run: |
          npm ci
          npm run build

      - name: Package Desktop
        working-directory: desktop
        run: npm run dist

      - name: Smoke check macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          echo "Listing desktop/dist-installers:"
          ls -la desktop/dist-installers || true

          DMG="$(ls -1 desktop/dist-installers/*.dmg | head -n 1)"
          echo "DMG=$DMG"

          echo "Mounting DMG..."
          PLIST_FILE="$(mktemp)"
          hdiutil attach "$DMG" -nobrowse -plist > "$PLIST_FILE"

          # Extract mount-point robustly (find first mount-point in system-entities)
          MOUNT="$(plutil -convert json -o - "$PLIST_FILE" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); ents=d.get('system-entities',[]); m=next((e.get('mount-point') for e in ents if isinstance(e,dict) and e.get('mount-point')), None); print(m or '')")"

          if [ -z "$MOUNT" ]; then
            echo "ERROR: Could not detect mount point from hdiutil plist."
            echo "hdiutil plist:"
            cat "$PLIST_FILE"
            exit 1
          fi

          echo "MOUNT=$MOUNT"
          ls -la "$MOUNT"

          APP="$(find "$MOUNT" -maxdepth 2 -name '*.app' -print -quit)"
          echo "APP=$APP"
          test -d "$APP"

          echo "Checking app bundle structure..."
          test -f "$APP/Contents/Info.plist"
          test -d "$APP/Contents/Resources"
          test -d "$APP/Contents/MacOS"
          test -f "$APP/Contents/MacOS/"* || (echo "Missing MacOS executable" && exit 1)

          echo "Info.plist summary:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP/Contents/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Print :CFBundleName" "$APP/Contents/Info.plist" || true

          echo "Unmounting..."
          hdiutil detach "$MOUNT" -quiet

      - name: Upload installers (artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            desktop/dist-installers/**/*.AppImage
            desktop/dist-installers/**/*.deb
            desktop/dist-installers/**/*.exe
            desktop/dist-installers/**/*.dmg
          if-no-files-found: error
          retention-days: 14

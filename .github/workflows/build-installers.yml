name: Release Desktop Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Export release version
        shell: bash
        run: |
          set -euo pipefail
          echo "RELEASE_VERSION=v$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          VERSION="v$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_NAME}" != "${VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${VERSION}" >&2
            exit 1
          fi

      - name: Install root deps
        run: npm ci

      - name: Install desktop deps
        run: npm --prefix desktop ci

      - name: Build release artifacts
        run: npm run release:build:${{ matrix.platform }}

      - name: Upload installers (artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: proworkbench-${{ env.RELEASE_VERSION }}-${{ matrix.platform }}
          path: |
            release/proworkbench-v*-${{ matrix.platform }}*
          if-no-files-found: error
          retention-days: 14

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download staged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Flatten artifact layout
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release/final
          find release -type f -name 'proworkbench-v*' -exec cp {} release/final/ \;
          ls -la release/final

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/final/*
          body_path: RELEASE_NOTES.md
